version: 1
applications:
  - appRoot: frontend       # points to the folder containing package.json
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist # Vite writes production files to ./frontend/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*