# foundry.toml
[profile.default]
src  = "src"
out  = "out"
libs = ["node_modules", "lib"]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
  "hardhat/=node_modules/hardhat/",
]

[rpc_endpoints]
anvil   = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
