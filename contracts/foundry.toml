# foundry.toml
[profile.default]
src  = "src"
out  = "out"
libs = ["lib"]                      # drop node_modules if you won't use it
solc = "0.8.30"

[rpc_endpoints]
anvil   = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"                     # long | short | preserve
quote_style = "double"                 # double | single | preserve
number_underscore = "thousands"        # preserve | thousands | remove
hex_underscore = "bytes"               # preserve | remove | bytes
wrap_comments = true
multiline_func_header = "attributes_first"  # attributes_first | params_first | all
single_line_statement_blocks = "preserve"   # single | multi | preserve
